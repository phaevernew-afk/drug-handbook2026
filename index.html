<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>院內用藥查詢</title>
<style>
:root{
  --ink:#1c2a2e;
  --paper:#f5f3ee;
  --panel:#ffffff;
  --line:#dcd7c9;
  --teal:#0f5c5c;
  --teal-dark:#0a3f3f;
  --accent:#c0793f;
  --muted:#6b7472;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --serif: 'Noto Serif TC', 'Songti TC', serif;
  --sans: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}
header{
  background:var(--teal-dark);
  color:#f5f3ee;
  padding:28px 24px 22px;
  border-bottom:4px solid var(--accent);
}
.header-inner{
  max-width:1100px;
  margin:0 auto;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:8px;
}
.brand{
  font-family:var(--serif);
  font-size:26px;
  letter-spacing:1px;
  font-weight:700;
}
.brand small{
  display:block;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:3px;
  color:#9fc7c0;
  font-weight:400;
  margin-top:4px;
}
.count-badge{
  font-family:var(--mono);
  font-size:12px;
  color:#9fc7c0;
  border:1px solid #2e6e6e;
  padding:5px 10px;
  border-radius:2px;
}
main{
  max-width:1100px;
  margin:0 auto;
  padding:24px;
}
.search-bar{
  display:flex;
  gap:0;
  background:var(--panel);
  border:1.5px solid var(--ink);
  box-shadow:4px 4px 0 var(--accent);
  margin-bottom:18px;
}
.search-bar input{
  flex:1;
  border:none;
  outline:none;
  padding:16px 18px;
  font-size:17px;
  font-family:var(--sans);
  background:transparent;
  color:var(--ink);
}
.search-bar .icon{
  display:flex;
  align-items:center;
  padding:0 16px;
  color:var(--muted);
  font-family:var(--mono);
  font-size:13px;
  border-right:1px solid var(--line);
}
.filters{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.filters button{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:0.5px;
  padding:7px 13px;
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--muted);
  cursor:pointer;
  border-radius:2px;
  transition:all .15s;
}
.filters button:hover{ border-color:var(--teal); color:var(--teal);}
.filters button.active{
  background:var(--teal);
  border-color:var(--teal);
  color:#fff;
}
.meta-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
  padding:0 2px;
}
#sortSelect{
  font-family:var(--mono);
  font-size:12px;
  border:1px solid var(--line);
  background:var(--panel);
  padding:4px 6px;
  color:var(--ink);
}
.results{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-left:4px solid var(--teal);
  padding:16px 18px;
  cursor:pointer;
  transition:border-color .15s, transform .1s;
}
.card:hover{
  border-left-color:var(--accent);
}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:12px;
  flex-wrap:wrap;
}
.card-name{
  font-family:var(--serif);
  font-size:18px;
  font-weight:700;
  color:var(--teal-dark);
}
.card-cn{
  font-size:14px;
  color:var(--ink);
}
.card-id{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
}
.card-sub{
  margin-top:6px;
  font-size:13px;
  color:var(--muted);
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.card-sub span b{ color:var(--ink); font-weight:600; }
.tag{
  display:inline-block;
  font-family:var(--mono);
  font-size:10px;
  border:1px solid var(--line);
  padding:1px 6px;
  border-radius:2px;
  color:var(--muted);
}
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-family:var(--mono);
  font-size:13px;
}
/* modal */
.overlay{
  position:fixed; inset:0;
  background:rgba(20,30,30,0.55);
  display:none;
  align-items:flex-start;
  justify-content:center;
  padding:40px 16px;
  overflow-y:auto;
  z-index:50;
}
.overlay.show{ display:flex; }
.modal{
  background:var(--panel);
  max-width:700px;
  width:100%;
  border:1.5px solid var(--ink);
  box-shadow:6px 6px 0 var(--accent);
  margin-bottom:40px;
}
.modal-head{
  background:var(--teal-dark);
  color:#f5f3ee;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.modal-head h2{
  margin:0;
  font-family:var(--serif);
  font-size:22px;
}
.modal-head .sub{
  font-family:var(--mono);
  font-size:12px;
  color:#9fc7c0;
  margin-top:4px;
}
.modal-close{
  background:none;
  border:1px solid #3a7373;
  color:#f5f3ee;
  width:30px; height:30px;
  cursor:pointer;
  font-size:16px;
  line-height:1;
  border-radius:2px;
  flex-shrink:0;
}
.modal-body{ padding:22px 24px 28px; }
.field{
  margin-bottom:16px;
}
.field-label{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:1.5px;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:5px;
  display:block;
}
.field-value{
  font-size:14.5px;
  line-height:1.7;
  color:var(--ink);
  white-space:pre-wrap;
}
.field-value.empty-val{ color:var(--muted); font-style:italic; }
.field-row{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}
.field-row .field{ flex:1; min-width:140px; }
footer{
  text-align:center;
  padding:30px 20px 50px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
}
footer a{ color:var(--teal); }
@media (max-width:600px){
  .brand{font-size:21px;}
  .search-bar input{padding:13px 14px; font-size:15px;}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">院內用藥查詢<small>PHARMACY FORMULARY LOOKUP</small></div>
    <div class="count-badge" id="countBadge">載入中...</div>
  </div>
</header>

<main>
  <div class="search-bar">
    <div class="icon">SEARCH</div>
    <input id="searchInput" type="text" placeholder="輸入藥品名 / 學名 / 商品名 / 中文名 / 適應症 / 索引碼..." autocomplete="off">
  </div>

  <div class="filters" id="filterBar">
    <button data-f="all" class="active">全部欄位</button>
    <button data-f="藥品名稱">藥品名</button>
    <button data-f="學名名稱">學名</button>
    <button data-f="商品名">商品名</button>
    <button data-f="藥品中文名">中文名</button>
    <button data-f="適應症">適應症</button>
    <button data-f="藥理作用">藥理分類</button>
  </div>

  <div class="meta-row">
    <span id="resultCount">—</span>
    <span>
      排序
      <select id="sortSelect">
        <option value="default">預設</option>
        <option value="name">藥品名 A–Z</option>
        <option value="cn">中文名</option>
      </select>
    </span>
  </div>

  <div class="results" id="results"></div>
</main>

<footer>
  資料來源：院內藥品手冊 · 僅供院內同仁查詢參考，實際用藥請以醫囑及最新仿單為準 ·
  <a href="admin.html">後台管理</a>
</footer>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modalName"></h2>
        <div class="sub" id="modalSub"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
let DATA = [];
let activeFilter = 'all';

const LABELS = {
  '識別碼':'識別碼','藥品名稱':'藥品名稱','學名名稱':'學名','原廠名':'原廠名',
  '藥品中文名':'中文名','商品名':'商品名','索引1':'索引1','索引2':'索引2','索引3':'索引3',
  '藥理':'藥理','用法用量':'用法用量','注意事項':'注意事項','適應症':'適應症',
  '副作用':'副作用','孕婦分級':'孕婦用藥分級','外觀':'外觀','備註欄':'備註','藥理作用':'藥理分類'
};
const ALL_FIELDS = ['藥品名稱','學名名稱','原廠名','藥品中文名','商品名','索引1','索引2','索引3','適應症'];

async function loadData(){
  try{
    const res = await fetch('drugs.json', {cache:'no-store'});
    DATA = await res.json();
  }catch(e){
    document.getElementById('results').innerHTML = '<div class="empty">資料載入失敗，請確認 drugs.json 是否存在於同目錄。</div>';
    return;
  }
  document.getElementById('countBadge').textContent = `共 ${DATA.length} 筆藥品資料`;
  render('');
}

function highlight(text, q){
  if(!q) return escapeHtml(text);
  const esc = escapeHtml(text);
  const idx = esc.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return esc;
  return esc.slice(0,idx) + '<mark style="background:#f0d9a8;color:inherit;padding:0 1px;">' + esc.slice(idx, idx+q.length) + '</mark>' + esc.slice(idx+q.length);
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function matches(item, q){
  if(!q) return true;
  const ql = q.toLowerCase();
  const fields = activeFilter === 'all' ? ALL_FIELDS : [activeFilter];
  return fields.some(f => (item[f]||'').toLowerCase().includes(ql));
}

function render(q){
  q = q.trim();
  let list = DATA.filter(d => matches(d, q));

  const sortMode = document.getElementById('sortSelect').value;
  if(sortMode === 'name'){
    list = [...list].sort((a,b)=> (a['藥品名稱']||'').localeCompare(b['藥品名稱']||''));
  } else if(sortMode === 'cn'){
    list = [...list].sort((a,b)=> (a['藥品中文名']||'').localeCompare(b['藥品中文名']||'', 'zh-Hant'));
  }

  document.getElementById('resultCount').textContent = q ? `符合 ${list.length} 筆` : `顯示全部 ${list.length} 筆`;

  const container = document.getElementById('results');
  if(list.length === 0){
    container.innerHTML = '<div class="empty">查無符合的藥品，請嘗試其他關鍵字</div>';
    return;
  }

  const MAX_RENDER = 200;
  const shown = list.slice(0, MAX_RENDER);

  container.innerHTML = shown.map(d => `
    <div class="card" data-id="${d['識別碼']}">
      <div class="card-top">
        <div class="card-name">${highlight(d['藥品名稱']||d['藥品']||'', q)}</div>
        <div class="card-id">#${d['識別碼']}</div>
      </div>
      <div class="card-cn">${highlight(d['藥品中文名']||'', q)}</div>
      <div class="card-sub">
        ${d['學名名稱'] ? `<span><b>學名</b> ${highlight(d['學名名稱'], q)}</span>` : ''}
        ${d['商品名'] ? `<span><b>商品名</b> ${highlight(d['商品名'], q)}</span>` : ''}
        ${d['適應症'] ? `<span><b>適應症</b> ${highlight(d['適應症'], q)}</span>` : ''}
        ${d['孕婦分級'] ? `<span class="tag">孕婦分級 ${d['孕婦分級']}</span>` : ''}
      </div>
    </div>
  `).join('') + (list.length > MAX_RENDER ? `<div class="empty">僅顯示前 ${MAX_RENDER} 筆，請輸入更精確的關鍵字縮小範圍</div>` : '');

  container.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.getAttribute('data-id');
      const item = DATA.find(d => String(d['識別碼']) === id);
      if(item) openModal(item);
    });
  });
}

function openModal(item){
  document.getElementById('modalName').textContent = item['藥品名稱'] || item['藥品'] || '';
  document.getElementById('modalSub').textContent = [item['藥品中文名'], item['學名名稱'], item['商品名']].filter(Boolean).join(' · ');

  const order = ['適應症','用法用量','藥理','注意事項','副作用','藥理作用','孕婦分級','外觀','備註欄','學名名稱','原廠名','商品名','索引1','索引2','索引3'];
  let html = '';
  // primary highlighted fields
  ['適應症','用法用量','藥理','注意事項','副作用'].forEach(f => {
    const v = item[f];
    html += `<div class="field"><span class="field-label">${LABELS[f]}</span><div class="field-value ${v?'':'empty-val'}">${escapeHtml(v) || '（無資料）'}</div></div>`;
  });
  html += `<div class="field-row">
    <div class="field"><span class="field-label">藥理分類</span><div class="field-value ${item['藥理作用']?'':'empty-val'}">${escapeHtml(item['藥理作用'])||'—'}</div></div>
    <div class="field"><span class="field-label">孕婦用藥分級</span><div class="field-value ${item['孕婦分級']?'':'empty-val'}">${escapeHtml(item['孕婦分級'])||'—'}</div></div>
    <div class="field"><span class="field-label">外觀</span><div class="field-value ${item['外觀']?'':'empty-val'}">${escapeHtml(item['外觀'])||'—'}</div></div>
  </div>`;
  if(item['備註欄']){
    html += `<div class="field"><span class="field-label">備註</span><div class="field-value">${escapeHtml(item['備註欄'])}</div></div>`;
  }
  html += `<div class="field-row">
    <div class="field"><span class="field-label">索引</span><div class="field-value">${[item['索引1'],item['索引2'],item['索引3']].filter(Boolean).join(' / ') || '—'}</div></div>
    <div class="field"><span class="field-label">原廠名</span><div class="field-value">${escapeHtml(item['原廠名'])||'—'}</div></div>
  </div>`;

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('modalClose').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'overlay') document.getElementById('overlay').classList.remove('show');
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') document.getElementById('overlay').classList.remove('show');
});

document.getElementById('searchInput').addEventListener('input', (e)=> render(e.target.value));
document.getElementById('sortSelect').addEventListener('change', ()=> render(document.getElementById('searchInput').value));

document.getElementById('filterBar').addEventListener('click', (e)=>{
  if(e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#filterBar button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.getAttribute('data-f');
  render(document.getElementById('searchInput').value);
});

loadData();
</script>
</body>
</html>
