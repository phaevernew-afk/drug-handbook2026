<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用藥管理後台</title>
    <!-- 引入 Tailwind CSS 樣式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 引入關鍵套件：SheetJS 讓網頁能直接讀取 Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2">
                📝 用藥管理後台
            </h1>
            <a href="index.html" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-medium transition">
                ← 回查詢介面
            </a>
        </div>
    </header>

    <!-- 後台功能操作區 -->
    <main class="max-w-7xl mx-auto px-4 mt-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 flex-wrap">
                
                <!-- 搜尋與檔案匯入區 -->
                <div class="flex items-center gap-3 flex-wrap">
                    <input type="text" id="admin-search" placeholder="搜尋藥品..." 
                           class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-slate-500">
                    
                    <!-- 隱藏的實際 File Input，改用按鈕觸發 -->
                    <input type="file" id="excel-file-input" accept=".xls,.xlsx" class="hidden">
                    <button onclick="document.getElementById('excel-file-input').click()" 
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1.5 shadow-sm">
                        📊 匯入 Excel 檔案
                    </button>

                    <button id="import-json-btn" class="border border-slate-300 hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition">
                        ⬆️ 匯入 JSON
                    </button>
                </div>

                <!-- 匯出與狀態區 -->
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium text-slate-500" id="admin-count">共 0 筆</span>
                    <button id="export-json-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1.5 shadow-sm">
                        📥 匯出 JSON
                    </button>
                </div>

            </div>

            <!-- 提示警告 -->
            <div class="mt-4 bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-lg text-sm flex flex-col md:flex-row justify-between gap-2">
                <span>⚠️ <strong>後台資料與查詢頁面獨立：</strong>此後台目前直接在瀏覽器記憶體中處理。請點擊「匯入 Excel」讀取最新檔案，確認表格正確後，點擊「匯出 JSON」並覆蓋到 GitHub 專案中即可更新。</span>
            </div>
        </div>

        <!-- 藥品表格顯示區 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 border-b border-slate-200 text-sm font-semibold">
                            <th class="p-4 w-16">ID</th>
                            <th class="p-4">藥品名稱</th>
                            <th class="p-4">中文名</th>
                            <th class="p-4">學名</th>
                            <th class="p-4">分類 (藥理作用)</th>
                            <th class="p-4">適應症</th>
                            <th class="p-4 w-20 text-center">孕婦</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-slate-400">目前暫無資料，請點擊上方按鈕匯入 Excel 或 JSON 檔案。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentDrugsData = [];

        // 監聽 Excel 檔案上傳
        document.getElementById('excel-file-input').addEventListener('change', handleExcelUpload);
        
        // 監聽 匯出 JSON 按鈕
        document.getElementById('export-json-btn').addEventListener('click', exportJsonFile);

        // 監聽 匯入 JSON 按鈕 (保留原功能)
        document.getElementById('import-json-btn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        currentDrugsData = JSON.parse(event.target.result);
                        renderAdminTable(currentDrugsData);
                    } catch(err) { alert('JSON 格式解析錯誤！'); }
                };
                reader.readAsText(file);
            };
            input.click();
        });

        // 監聽即時關鍵字搜尋
        document.getElementById('admin-search').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase().trim();
            if(!kw) {
                renderAdminTable(currentDrugsData);
                return;
            }
            const filtered = currentDrugsData.filter(d => {
                return [d['藥品名稱'], d['藥品中文名'], d['學名名稱'], d['藥理作用'], d['適應症']]
                       .some(f => (f || '').toString().toLowerCase().includes(kw));
            });
            renderAdminTable(filtered, false); // 不更新總筆數計數，只做畫面篩選
        });

        // 處理 Excel 檔案讀取
        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // 優先尋找名稱叫作「藥品」的工作表，找不到就抓第一張
                const sheetName = workbook.SheetNames.includes('藥品') ? '藥品' : workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // 將 Excel 轉換成 JSON 陣列物件
                const rawJson = XLSX.utils.sheet_to_json(worksheet);
                
                if (rawJson.length === 0) {
                    alert('Excel 內沒有發現任何資料！');
                    return;
                }

                currentDrugsData = rawJson;
                renderAdminTable(currentDrugsData);
                alert(`成功讀取 Excel！共匯入 ${currentDrugsData.length} 筆藥品資料。`);
            };
            reader.readAsArrayBuffer(file);
            // 清空 input 讓同一個檔案可以重複上傳觸發
            e.target.value = '';
        }

        // 渲染後台表格
        function renderAdminTable(data, updateCount = true) {
            const tbody = document.getElementById('admin-table-body');
            if(updateCount) {
                document.getElementById('admin-count').textContent = `共 ${data.length} 筆`;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-slate-400">找不到符合搜尋條件的資料</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(drug => {
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-mono text-slate-400">${drug['識別碼'] || ''}</td>
                        <td class="p-4 font-medium text-slate-900">${drug['藥品名稱'] || ''}</td>
                        <td class="p-4 text-slate-700">${drug['藥品中文名'] || ''}</td>
                        <td class="p-4 text-slate-600 text-xs font-mono">${drug['學名名稱'] || ''}</td>
                        <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs">${drug['藥理作用'] || ''}</span></td>
                        <td class="p-4 text-slate-500 max-w-xs truncate" title="${drug['適應症'] || ''}">${drug['適應症'] || ''}</td>
                        <td class="p-4 text-center font-bold text-red-600">${drug['孕婦分級'] || ''}</td>
                    </tr>
                `;
            }).join('');
        }

        // 匯出成新的 drugs.json 檔案
        function exportJsonFile() {
            if (currentDrugsData.length === 0) {
                alert('目前沒有任何資料可以匯出！請先匯入 Excel。');
                return;
            }
            
            const jsonString = JSON.stringify(currentDrugsData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = "drugs.json"; // 預設下載檔名
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
