<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本院藥品手冊 115 年版</title>
<style>
  :root {
    --teal:   #0d7a6e;
    --teal2:  #0a5f55;
    --teal-lt:#e8f5f3;
    --accent: #e8734a;
    --gray1:  #f4f6f8;
    --gray2:  #e2e8ed;
    --gray3:  #8a96a0;
    --text:   #1e2a30;
    --card-shadow: 0 2px 8px rgba(0,0,0,.08);
    --radius: 10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;background:var(--gray1);color:var(--text);min-height:100vh}

  /* ── Header ── */
  header{background:linear-gradient(135deg,var(--teal2) 0%,var(--teal) 100%);color:#fff;padding:20px 24px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
  .header-row{display:flex;align-items:center;gap:14px;max-width:1200px;margin:0 auto}
  .logo{width:44px;height:44px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .header-text h1{font-size:1.15rem;font-weight:700;letter-spacing:.5px}
  .header-text p{font-size:.78rem;opacity:.78;margin-top:2px}
  .drug-count{margin-left:auto;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:.8rem;white-space:nowrap;flex-shrink:0}

  /* ── Search bar ── */
  .search-wrap{background:#fff;border-bottom:1px solid var(--gray2);padding:14px 16px;position:sticky;top:82px;z-index:99}
  .search-inner{max-width:1200px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap}
  .search-box{flex:1;min-width:200px;display:flex;align-items:center;background:var(--gray1);border:1.5px solid var(--gray2);border-radius:8px;padding:0 12px;gap:8px}
  .search-box:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,122,110,.12)}
  .search-icon{color:var(--gray3);font-size:1rem;flex-shrink:0}
  .search-box input{border:none;background:transparent;outline:none;padding:10px 0;font-size:.95rem;width:100%;color:var(--text)}
  .search-box input::placeholder{color:var(--gray3)}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;width:100%}
  select{background:var(--gray1);border:1.5px solid var(--gray2);border-radius:8px;padding:8px 12px;font-size:.88rem;color:var(--text);cursor:pointer;outline:none;flex:1;min-width:140px}
  select:focus{border-color:var(--teal)}
  .btn-clear{background:transparent;border:1.5px solid var(--gray2);border-radius:8px;padding:8px 16px;font-size:.85rem;cursor:pointer;color:var(--gray3);white-space:nowrap}
  .btn-clear:hover{border-color:var(--accent);color:var(--accent)}

  /* ── Result bar ── */
  .result-bar{max-width:1200px;margin:14px auto 0;padding:0 4px;display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--gray3)}
  .result-bar strong{color:var(--teal);font-size:1rem}
  .tag-list{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  .tag{background:var(--teal-lt);color:var(--teal2);border-radius:20px;padding:2px 10px;font-size:.78rem;cursor:pointer}
  .tag:hover{background:var(--teal);color:#fff}

  /* ── Layout ── */
  main{max-width:1200px;margin:0 auto;padding:16px}

  /* ── Drug cards ── */
  .cards{display:grid;gap:12px}
  @media(min-width:700px){.cards{grid-template-columns:1fr 1fr}}
  @media(min-width:1050px){.cards{grid-template-columns:1fr 1fr 1fr}}

  .card{background:#fff;border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid transparent}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12);border-color:var(--teal)}
  .card.open{border-color:var(--teal);box-shadow:0 4px 16px rgba(13,122,110,.15)}

  .card-head{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-name{font-size:1rem;font-weight:700;color:var(--teal2);line-height:1.3}
  .card-brand{font-size:.8rem;color:var(--gray3);margin-top:3px}
  .card-badge{flex-shrink:0;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
  .badge{display:inline-block;border-radius:5px;padding:2px 8px;font-size:.72rem;font-weight:600;white-space:nowrap}
  .badge-cat{background:var(--teal-lt);color:var(--teal2)}
  .badge-sub{background:#fff3ee;color:#b85c2a}
  .badge-preg{background:#fdf4e7;color:#9a6200}
  
  .card-preview{padding:0 16px 12px;font-size:.82rem;color:#4a5760;line-height:1.55;border-top:1px solid var(--gray2);padding-top:10px}
  .preview-item{margin-bottom:4px}
  .preview-label{font-weight:600;color:var(--gray3);font-size:.75rem;text-transform:uppercase;letter-spacing:.4px}

  /* ── Drug detail panel ── */
  .detail-panel{display:none;padding:0 16px 16px}
  .card.open .detail-panel{display:block}
  .card.open .card-preview{display:none}

  .detail-section{margin-bottom:14px;border-top:1px solid var(--gray2);padding-top:12px}
  .detail-section:first-child{border-top:none;padding-top:0}
  .detail-label{font-size:.72rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
  .detail-val{font-size:.87rem;line-height:1.7;color:var(--text)}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .detail-grid .detail-section{border-top:none;padding-top:0}
  .highlight{background:#fff9c4;border-radius:3px;padding:0 2px}

  .btn-close{display:block;margin:12px auto 0;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 24px;cursor:pointer;font-size:.88rem}
  .btn-close:hover{background:var(--teal2)}

  /* ── Empty state ── */
  .empty{text-align:center;padding:60px 20px;color:var(--gray3)}
  .empty .icon{font-size:3rem;margin-bottom:12px}
  .empty p{font-size:.95rem}

  /* ── Loading ── */
  .loading{text-align:center;padding:60px;color:var(--gray3);font-size:.95rem}
  .spinner{width:36px;height:36px;border:3px solid var(--gray2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Footer ── */
  footer{text-align:center;padding:24px;font-size:.78rem;color:var(--gray3);border-top:1px solid var(--gray2);margin-top:24px}

  /* ── Mobile tweaks ── */
  @media(max-width:480px){
    header{padding:14px 16px 12px}
    .header-text h1{font-size:1rem}
    .search-wrap{padding:12px}
    main{padding:10px}
    .detail-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">💊</div>
    <div class="header-text">
      <h1>本院藥品手冊</h1>
      <p>115 年版 — 院內用藥查詢系統</p>
    </div>
    <div class="drug-count" id="totalCount">載入中…</div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="搜尋藥品名稱、學名、原廠名、適應症、副作用…" autocomplete="off">
    </div>
    <div class="filter-row">
      <select id="catFilter">
        <option value="">全部分類</option>
      </select>
      <select id="subcatFilter">
        <option value="">全部次分類</option>
      </select>
      <select id="formFilter">
        <option value="">全部劑型</option>
        <option value="口服">口服</option>
        <option value="注射">注射劑</option>
        <option value="外用">外用</option>
        <option value="吸入">吸入劑</option>
        <option value="眼藥">眼藥</option>
        <option value="耳藥">耳藥</option>
      </select>
      <button class="btn-clear" onclick="clearFilters()">✕ 清除篩選</button>
    </div>
  </div>
  <div class="result-bar" id="resultBar"></div>
</div>

<main>
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    載入藥品資料中…
  </div>
  <div class="cards" id="cardContainer" style="display:none"></div>
  <div class="empty" id="emptyEl" style="display:none">
    <div class="icon">🔎</div>
    <p>找不到符合條件的藥品，請嘗試其他關鍵字或調整篩選條件</p>
  </div>
</main>

<footer>
  本院藥品手冊 115 年版 · 僅供院內醫療人員查閱參考 · 資料如有更新請洽藥劑科
  &nbsp;·&nbsp; <a href="admin.html" style="color:var(--gray3);text-decoration:none">管理後台</a>
</footer>

<script>
let DRUGS = [];
let filteredDrugs = [];
let openCardId = null;

// ── Load data ──
fetch('drugs.json')
  .then(r => r.json())
  .then(data => {
    DRUGS = data;
    document.getElementById('totalCount').textContent = `共 ${DRUGS.length} 筆藥品`;
    buildFilters();
    render(DRUGS);
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('cardContainer').style.display = 'grid';
  })
  .catch(e => {
    document.getElementById('loadingEl').innerHTML = '⚠️ 無法載入藥品資料，請確認 drugs.json 是否存在';
  });

// ── Build category selects ──
function buildFilters() {
  const cats = [...new Set(DRUGS.map(d => d['大分類']).filter(Boolean))].sort();
  const catSel = document.getElementById('catFilter');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    catSel.appendChild(o);
  });
}

function updateSubcats(cat) {
  const sub = document.getElementById('subcatFilter');
  sub.innerHTML = '<option value="">全部次分類</option>';
  if (!cat) return;
  const subs = [...new Set(DRUGS.filter(d => d['大分類'] === cat).map(d => d['小分類']).filter(Boolean))].sort();
  subs.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sub.appendChild(o);
  });
}

document.getElementById('catFilter').addEventListener('change', function() {
  updateSubcats(this.value);
  applyFilters();
});
document.getElementById('subcatFilter').addEventListener('change', applyFilters);
document.getElementById('formFilter').addEventListener('change', applyFilters);

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(applyFilters, 160);
});

function applyFilters() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const subcat = document.getElementById('subcatFilter').value;
  const form = document.getElementById('formFilter').value;

  filteredDrugs = DRUGS.filter(d => {
    if (cat && d['大分類'] !== cat) return false;
    if (subcat && d['小分類'] !== subcat) return false;
    if (form && !d['劑量劑型'].includes(form)) return false;
    if (kw) {
      const haystack = [
        d['藥品名稱'], d['原廠名'], d['學名名稱'],
        d['適應症'], d['副作用'], d['藥理'],
        d['注意事項'], d['用法用量'], d['備註欄']
      ].join(' ').toLowerCase();
      if (!haystack.includes(kw)) return false;
    }
    return true;
  });

  updateResultBar(kw, cat, subcat, form);
  render(filteredDrugs);
}

function updateResultBar(kw, cat, subcat, form) {
  const bar = document.getElementById('resultBar');
  const n = (kw || cat || subcat || form) ? filteredDrugs.length : DRUGS.length;
  const total = DRUGS.length;
  let html = `顯示 <strong>${n}</strong> / ${total} 筆`;
  if (kw) html += ` &nbsp;·&nbsp; 關鍵字：<span style="color:var(--accent)">${escHtml(kw)}</span>`;
  bar.innerHTML = html;
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('catFilter').value = '';
  document.getElementById('subcatFilter').innerHTML = '<option value="">全部次分類</option>';
  document.getElementById('formFilter').value = '';
  applyFilters();
}

// ── Render cards ──
function render(list) {
  const container = document.getElementById('cardContainer');
  const empty = document.getElementById('emptyEl');
  
  if (list.length === 0) {
    container.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  container.style.display = 'grid';
  
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  
  container.innerHTML = list.map(d => buildCard(d, kw)).join('');
  
  // attach click handlers
  container.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('btn-close')) {
        this.classList.remove('open');
        openCardId = null;
        return;
      }
      const id = +this.dataset.id;
      if (openCardId === id) {
        this.classList.remove('open');
        openCardId = null;
      } else {
        document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
        this.classList.add('open');
        openCardId = id;
        this.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    });
  });
}

function buildCard(d, kw) {
  const hl = s => kw ? escHtml(s).replace(new RegExp(escRe(kw), 'gi'), m => `<span class="highlight">${m}</span>`) : escHtml(s);
  const pregText = d['孕婦分級'] ? d['孕婦分級'].substring(0, 30) : '';

  return `<div class="card" data-id="${d.id}">
  <div class="card-head">
    <div>
      <div class="card-name">${hl(d['藥品名稱'])}</div>
      <div class="card-brand">${hl(d['原廠名'])} ${d['學名名稱'] && d['學名名稱']!==d['藥品名稱'] ? '· '+hl(d['學名名稱']) : ''}</div>
    </div>
    <div class="card-badge">
      ${d['大分類'] ? `<span class="badge badge-cat">${escHtml(shortCat(d['大分類']))}</span>` : ''}
      ${d['小分類'] ? `<span class="badge badge-sub">${escHtml(d['小分類'])}</span>` : ''}
      ${pregText ? `<span class="badge badge-preg">孕 ${escHtml(pregText)}</span>` : ''}
    </div>
  </div>
  <div class="card-preview">
    ${d['劑量劑型'] ? `<div class="preview-item"><span class="preview-label">劑型</span> ${hl(d['劑量劑型'])}</div>` : ''}
    ${d['適應症'] ? `<div class="preview-item"><span class="preview-label">適應症</span> ${hl(truncate(d['適應症'], 80))}</div>` : ''}
  </div>
  <div class="detail-panel">
    <div class="detail-grid">
      ${detailSection('原廠名', d['原廠名'], hl)}
      ${detailSection('學名名稱', d['學名名稱'], hl)}
      ${detailSection('劑量劑型', d['劑量劑型'], hl)}
      ${pregText ? detailSection('孕婦分級', d['孕婦分級'], hl) : ''}
    </div>
    ${detailSection('藥理', d['藥理'], hl)}
    ${detailSection('適應症', d['適應症'], hl)}
    ${detailSection('用法用量', d['用法用量'], hl)}
    ${detailSection('注意事項', d['注意事項'], hl)}
    ${detailSection('副作用', d['副作用'], hl)}
    ${d['備註欄'] ? detailSection('備註欄', d['備註欄'], hl) : ''}
    <button class="btn-close">收起 ▲</button>
  </div>
</div>`;
}

function detailSection(label, val, hl) {
  if (!val) return '';
  return `<div class="detail-section">
    <div class="detail-label">${label}</div>
    <div class="detail-val">${hl(val)}</div>
  </div>`;
}

function shortCat(s) {
  // Abbreviate long category names for badge display
  const map = {
    '作用在中樞神經系統的藥物': '中樞神經',
    '作用在心臟血管系統的藥物': '心臟血管',
    '作用在肌肉骨骼系統的藥物': '肌肉骨骼',
    '作用在呼吸道系統的藥物': '呼吸道',
    '作用在胃腸道的藥物': '胃腸道',
    '作用在泌尿系統的藥物': '泌尿系統',
    '作用在內分泌腺的藥物': '內分泌',
    '作用在血液系統的藥物': '血液系統',
    '維他命與礦物質': '維他命',
    '營養素、輸液和電解質': '輸液電解質',
    '頭孢子菌類': '頭孢子菌',
    '抗巴金森症的藥物': '抗巴金森',
    '抗驚厥劑': '抗驚厥',
    '抗濾過性病毒': '抗病毒',
    '抗結核劑': '抗結核',
    '腦代謝改善劑': '腦代謝',
    '疥蟲藥和滅蝨藥': '疥蟲/蝨',
  };
  return map[s] || s;
}

function truncate(s, n) { return s && s.length > n ? s.substring(0,n)+'…' : (s||'') }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') }
</script>
</body>
</html>
